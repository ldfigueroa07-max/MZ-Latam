// ─── Module file: add files handler ───
async function addModFiles(modId, input) {
    const files = Array.from(input.files);
    if (!files.length) return;
    input.value = '';

    const btn = document.querySelector(`#mfs-${modId} .mod-file-add`);
    if (btn) btn.textContent = 'Procesando…';

    let parsedCount = 0;

    for (const file of files) {
        if (file.size > MAX_FILE_B) {
            toast(`⚠️ "${file.name}" supera 3 MB — no se pudo guardar`);
            continue;
        }
        const ext   = file.name.split('.').pop().toLowerCase();
        const isImg = IMG_EXT.includes(ext);
        const isPdf = PDF_EXT.includes(ext);
        const isTxt = TXT_EXT.includes(ext);
        const isXls = XLS_EXT.includes(ext);
        const id    = uid();

        let dataUrl = null;
        if (isImg) {
            dataUrl = await compressImage(file);
        } else if (isPdf) {
            dataUrl = await readAsDataURL(file);
        } else if (isTxt) {
            // Parse TXT/CSV → auto-populate items + notes
            const { rows, rawText } = await parseTxtFile(file);
            if (rows.length) {
                importParsedRows(modId, rows);
                parsedCount += rows.length;
            }
            appendModNote(modId, file.name, rawText);
            dataUrl = null; // store name only, no binary needed
        } else if (isXls) {
            // Parse Excel → auto-populate items + notes
            const { rows, rawText } = await parseXlsFile(file);
            if (rows.length) {
                importParsedRows(modId, rows);
                parsedCount += rows.length;
            }
            appendModNote(modId, file.name, rawText);
            dataUrl = null;
        }

        sesFiles[modId] = sesFiles[modId] || [];
        sesFiles[modId].push({ id, name: file.name, size: file.size, type: file.type, dataUrl, isImg, isPdf, isTxt, isXls });
    }

    // Refresh grid
    const grid = document.getElementById(`mf-grid-${modId}`);
    if (grid) grid.innerHTML = vModFileGrid(modId);
    if (btn) btn.textContent = '+ Agregar archivo';

    if (parsedCount > 0) {
        toast(`✅ ${parsedCount} ítem(s) importados automáticamente al módulo`);
    } else {
        toast(`✅ ${files.length} archivo(s) adjuntado(s) al módulo`);
    }
}

// ─── Parse TXT / CSV → { rows, rawText } ───
// Expected column order: Descripción | Cantidad | Unidad | Precio USD
// Separators: tab, semicolon, pipe or comma. Lines starting with # are skipped.
async function parseTxtFile(file) {
    const rawText = await file.text();
    const lines   = rawText.split(/\r?\n/).map(l => l.trim()).filter(l => l && !l.startsWith('#'));
    const rows    = [];
    for (const line of lines) {
        const sep  = line.includes('\t') ? '\t'
                   : line.includes(';')  ? ';'
                   : line.includes('|')  ? '|'
                   : ',';
        const cols = line.split(sep).map(c => c.trim());
        if (!cols[0]) continue;
        const desc     = cols[0];
        const qty      = parseFloat((cols[1]||'').replace(',','.')) || 1;
        const rawUnitTxt = (cols[2]||'').trim().toLowerCase();
        const normUnitTxt = rawUnitTxt === 'm2' || rawUnitTxt === 'sqm' ? 'm²'
                          : rawUnitTxt === 'm3' || rawUnitTxt === 'cbm' ? 'm³'
                          : rawUnitTxt === 'ml' || rawUnitTxt === 'lm'  ? 'ml'
                          : rawUnitTxt === 'u'  || rawUnitTxt === 'und' || rawUnitTxt === 'unid' ? 'un'
                          : rawUnitTxt === 'global' ? 'gl'
                          : rawUnitTxt === 'hr' || rawUnitTxt === 'h' ? 'hs'
                          : rawUnitTxt;
        const unit     = UNITS.includes(normUnitTxt) ? normUnitTxt : 'un';
        const priceUSD = parseFloat((cols[3]||cols[1]||'').replace(',','.').replace(/[^0-9.]/g,'')) || 0;
        rows.push({ desc, qty, unit, priceUSD });
    }
    return { rows, rawText };
}

// ─── Parse Excel (.xlsx/.xls) → { rows, rawText } using SheetJS (lazy CDN load) ───
async function parseXlsFile(file) {
    if (!window.XLSX) {
        await new Promise((res, rej) => {
            const s = document.createElement('script');
            s.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
            s.onload = res; s.onerror = rej;
            document.head.appendChild(s);
        });
    }
    const buf  = await file.arrayBuffer();
    const wb   = window.XLSX.read(buf, { type: 'array' });
    const ws   = wb.Sheets[wb.SheetNames[0]];
    const data = window.XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
    const rows = [];

    // Build human-readable rawText (tab-separated table)
    const rawText = data.map(row => row.map(c => String(c)).join('\t')).join('\n');

    // Auto-detect header row
    let startIdx = 0;
    for (let i = 0; i < Math.min(data.length, 5); i++) {
        const row = data[i].map(c => String(c).toLowerCase());
        if (row.some(c => ['desc','concepto','item','detalle','nombre','rubro'].some(k => c.includes(k)))) {
            startIdx = i + 1;
            break;
        }
    }

    for (let i = startIdx; i < data.length; i++) {
        const row = data[i];
        if (!row || !row.length) continue;
        const desc     = String(row[0] || '').trim();
        if (!desc) continue;
        const qty      = parseFloat(String(row[1]||'1').replace(',','.')) || 1;
        const rawUnit  = String(row[2]||'').trim().toLowerCase();
        // Normalize common variants (Revit exports m2, M2, sqm, etc.)
        const normUnit = rawUnit === 'm2' || rawUnit === 'sqm' || rawUnit === 'm 2' ? 'm²'
                       : rawUnit === 'm3' || rawUnit === 'cbm' || rawUnit === 'm 3' ? 'm³'
                       : rawUnit === 'ml' || rawUnit === 'lm'  || rawUnit === 'm'   ? 'ml'
                       : rawUnit === 'un' || rawUnit === 'u'   || rawUnit === 'und' || rawUnit === 'unid' ? 'un'
                       : rawUnit === 'gl' || rawUnit === 'global' ? 'gl'
                       : rawUnit === 'hs' || rawUnit === 'hr'  || rawUnit === 'h'   ? 'hs'
                       : rawUnit === 'kg' ? 'kg'
                       : rawUnit === 'lote' ? 'lote'
                       : rawUnit;
        const unit     = UNITS.includes(normUnit) ? normUnit : 'un';
        const priceRaw = String(row[3] || row[1] || '0').replace(',','.').replace(/[^0-9.]/g,'');
        const priceUSD = parseFloat(priceRaw) || 0;
        rows.push({ desc, qty, unit, priceUSD });
    }
    return { rows, rawText };
}

// ─── Append imported text to module notes ───
function appendModNote(modId, fileName, text) {
    const header   = `── ${fileName} ──\n`;
    const existing = sesNotes[modId] || '';
    sesNotes[modId] = (existing ? existing + '\n\n' : '') + header + text.trim();

    const ta = document.getElementById(`mn-${modId}`);
    if (ta) {
        ta.value = sesNotes[modId];
        ta.classList.add('populated');
        // Auto-expand height to show content
        ta.style.height = 'auto';
        ta.style.height = Math.min(ta.scrollHeight, 280) + 'px';
    }
}

// ─── Import parsed rows into a module ───
function importParsedRows(modId, rows) {
    // Expand the module accordion
    modExpand[modId] = true;
    const body  = document.getElementById(`mb-${modId}`);
    const arrow = document.querySelector(`#mr-${modId} .mod-arrow`);
    if (body)  body.classList.add('open');
    if (arrow) arrow.classList.add('open');

    sesItems[modId] = sesItems[modId] || [];
    const tbody = document.getElementById(`it-${modId}`);
    const ph    = document.getElementById(`ph-${modId}`);
    if (ph) ph.remove();

    rows.forEach(r => {
        const item = { id: uid(), desc: r.desc, qty: r.qty, unit: r.unit, priceUSD: r.priceUSD };
        sesItems[modId].push(item);
        if (tbody) tbody.insertAdjacentHTML('beforeend', vItemRow(modId, item));
    });

    refreshModRow(modId);
    calcEst();
}

// ─── Module file: remove ───
function rmModFile(modId, fileId) {
    sesFiles[modId] = (sesFiles[modId]||[]).filter(f => f.id !== fileId);
    const grid = document.getElementById(`mf-grid-${modId}`);
    if (grid) grid.innerHTML = vModFileGrid(modId);

function openLightbox(fileId, modId) {
    const f = (sesFiles[modId]||[]).find(x => x.id === fileId);
    if (!f || !f.dataUrl) return;

function openLightboxDirect(dataUrl, name) {
    const lb = document.createElement('div');
    lb.className = 'lightbox';
    lb.innerHTML = `<span class="lb-close" onclick="this.parentElement.remove()">✕</span>
                    <img src="${dataUrl}" alt="${esc(name||'')}">`;
    lb.onclick = e => { if (e.target === lb) lb.remove(); };
    document.body.appendChild(lb);
}

// ─── Image compression via canvas ───
function compressImage(file) {
    return new Promise(resolve => {
        const reader = new FileReader();
        reader.onload = e => {
            const img = new Image();
            img.onload = () => {
                let w = img.width, h = img.height;
                if (w > MAX_IMG_PX || h > MAX_IMG_PX) {
                    if (w >= h) { h = Math.round(h * MAX_IMG_PX / w); w = MAX_IMG_PX; }
                    else        { w = Math.round(w * MAX_IMG_PX / h); h = MAX_IMG_PX; }
                }
                const c = document.createElement('canvas');
                c.width = w; c.height = h;
                c.getContext('2d').drawImage(img, 0, 0, w, h);
                resolve(c.toDataURL('image/jpeg', 0.78));
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    });
}

// ─── Generic file to base64 ───
function readAsDataURL(file) {
    return new Promise(resolve => {
        const r = new FileReader();
        r.onload = e => resolve(e.target.result);
        r.readAsDataURL(file);
    });
}

// ─── Update item field ───
function updItem(modId, itemId, field, value) {
    const items = sesItems[modId] || [];
    const item  = items.find(i => i.id === itemId);
    if (!item) return;
    item[field] = value;

    // Update subtotal cell live
    const sub    = (parseFloat(item.qty)||0) * (parseFloat(item.priceUSD)||0);
    const subEl  = document.getElementById(`is-${itemId}`);
    if (subEl) {
        subEl.textContent = sub > 0 ? fPri(sub) : '—';
        subEl.className   = `item-sub ${sub===0?'zero':''}`;
    }

    refreshModRow(modId);
    calcEst();
}

// ─── Refresh module row header (total + badge) without full re-render ───
function refreshModRow(modId) {
    const m2val  = parseFloat(document.getElementById('e-m2')?.value) || 0;
    const on     = modOn[modId] !== false;
    const items  = sesItems[modId] || [];
    const isItems = items.length > 0;
    const total  = modTotal(modId, m2val);
    const m      = cfg.modules.find(x => x.id === modId);
    const row    = document.getElementById(`mr-${modId}`);

    if (row) {
        row.classList.toggle('on',  on);
        row.classList.toggle('off', !on);
    }

    // toggle switch class
    const tog = document.querySelector(`#mr-${modId} .mod-toggle`);
    if (tog) tog.classList.toggle('on', on);

    // subtotal in header
    const st = document.getElementById(`ms-${modId}`);
    if (st) st.textContent = (on && (m2val>0 || isItems)) ? fPri(total) : '—';

    // badge
    const badge = document.querySelector(`#mr-${modId} .mod-badge`);
    if (badge) {
        badge.className = `mod-badge ${isItems?'items-mode':'m2-mode'}`;
        badge.textContent = isItems
            ? `📋 ${items.length} ítem${items.length!==1?'s':''}`
            : `m² × ${fPri(m?.costUSD||0)}`;
    }

    // footer total
    const ft    = document.getElementById(`mf-${modId}`);
    const ftArs = document.getElementById(`mf-ars-${modId}`);
    if (ft) ft.textContent = on ? (isItems ? fPri(total) : `Estimado m²: ${fPri(total)}`) : '—';
    if (ftArs) ftArs.textContent = (on && (m2val>0 || isItems)) ? fSec(total, getTCForm()) : '';
}

// ─── Recalculate grand total ───
function getTCForm() {
    return parseFloat(document.getElementById('e-tc')?.value) || cfg.usdArs;
}

function onCurrencyChange() {
    const sel = document.querySelector('input[name="e-moneda"]:checked');
    sesCurrency = sel ? sel.value : 'USD';
    const isARS = sesCurrency === 'ARS';

    // Update toggle visual
    const uLbl = document.getElementById('cur-usd-lbl');
    const aLbl = document.getElementById('cur-ars-lbl');
    if (uLbl) {
        uLbl.style.background = isARS ? '#fff' : '#111';
        uLbl.style.color      = isARS ? '#555' : '#fff';
        uLbl.style.border     = isARS ? '2px solid #d0d0d0' : '2px solid #111';
    }
    if (aLbl) {
        aLbl.style.background = isARS ? '#111' : '#fff';
        aLbl.style.color      = isARS ? '#fff' : '#555';
        aLbl.style.border     = isARS ? '2px solid #111' : '2px solid #d0d0d0';
    }

    // Update column headers in all open module tables
    document.querySelectorAll('.items-table thead th:nth-child(4)').forEach(th => {
        th.textContent = 'Precio ' + priLbl();
    });

    calcEst();
}

function calcEst() {
    const m2val  = parseFloat(document.getElementById('e-m2')?.value) || 0;
    const mg     = cfg.margen / 100;
    const tc     = getTCForm();
    const total  = grandTotal(m2val);

    // Refresh all module rows
    cfg.modules.forEach(m => refreshModRow(m.id));

    const usdEl  = document.getElementById('r-usd');
    const rngEl  = document.getElementById('r-rng-usd');
    const arsEl  = document.getElementById('r-ars');
    const arsREl = document.getElementById('r-rng-ars');
    const bkEl   = document.getElementById('bk-list');

    const hasData = total > 0;

    // Update labels and TC note dynamically
    const tcNote  = document.getElementById('r-tc-note');
    const priLblEl = document.getElementById('r-lbl-pri');
    const secLblEl = document.getElementById('r-lbl-sec');
    if (tcNote)   tcNote.textContent  = `TC: 1 USD = ARS ${fmt(tc)}`;
    if (priLblEl) priLblEl.textContent = isModeARS() ? 'Total en Pesos Argentinos' : 'Total Estimado';
    if (secLblEl) secLblEl.textContent = isModeARS() ? 'Equivalente en Dólares'    : 'En Pesos Argentinos';

    if (hasData) {
        const lo = total*(1-mg), hi = total*(1+mg);
        if (usdEl)  usdEl.textContent  = fPri(total);
        if (rngEl)  rngEl.textContent  = `Rango ±${cfg.margen}%: ${fPri(lo)} — ${fPri(hi)}`;
        if (arsEl)  arsEl.textContent  = fSec(total, tc);
        if (arsREl) arsREl.textContent = `${fSec(lo,tc)} — ${fSec(hi,tc)}`;
        if (bkEl)   bkEl.innerHTML     = bkHTML(m2val, total);
    } else {
        if (usdEl)  usdEl.textContent  = '—';
        if (rngEl)  rngEl.textContent  = 'Ingresá los datos del proyecto';
        if (arsEl)  arsEl.textContent  = '—';
        if (arsREl) arsREl.textContent = '';
        if (bkEl)   bkEl.innerHTML     = '<div style="color:#bbb;font-size:15px;text-align:center;padding:12px">Ingresá datos para ver el desglose</div>';
    }
}

function bkHTML(m2val, total) {
    return cfg.modules
        .filter(m => modOn[m.id] !== false)
        .map(m => {
            const v   = modTotal(m.id, m2val);
            const pct = total > 0 ? Math.round(v/total*100) : 0;
            return `<div class="bk-row">
                ${modBadge(m.id,'sm')}
                <div style="flex:1">
                    <div style="display:flex;justify-content:space-between;font-size:15px;margin-bottom:3px">
                        <span>${m.name}</span><span style="font-weight:600">${fPri(v)}</span>
                    </div>
                    <div class="bk-bar"><div class="bk-fill" style="width:${pct}%"></div></div>
                </div>
                <span style="font-size:14px;color:#aaa;width:28px;text-align:right">${pct}%</span>
            </div>`;
        }).join('');
}

// ─── Prefill estimador when editing ───
function prefill() {
    const p = plist.find(x => x.id === editId);
    if (!p) return;
    const set = (id, v) => { const el = document.getElementById(id); if(el) el.value = v||''; };
    set('e-cli',  p.cliente);
    set('e-pro',  p.proyecto);
    set('e-ubic', p.ubicacion);
    set('e-notas',p.notas);
    set('e-m2',   p.metros);
    set('e-tc',   p.usdArs || cfg.usdArs);
    // Restore currency
    sesCurrency = p.moneda || 'USD';
    const usdRadio = document.getElementById('e-moneda-usd');
    const arsRadio = document.getElementById('e-moneda-ars');
    if (usdRadio) usdRadio.checked = sesCurrency === 'USD';
    if (arsRadio) arsRadio.checked = sesCurrency === 'ARS';
    onCurrencyChange();
    const asgEl = document.getElementById('e-asignado');
    if (asgEl && p.assignedTo) asgEl.value = p.assignedTo;
    const tipoEl = document.getElementById('e-tipo');
    if (tipoEl) tipoEl.value = p.tipo || 'local';
    // Restore contacts
    const ct = p.contacts || {};
    set('e-cc-nom',   ct.comercial?.nom   || '');
    set('e-cc-email', ct.comercial?.email || '');
    set('e-cc-tel',   ct.comercial?.tel   || '');
    set('e-ca-nom',   ct.administracion?.nom   || '');
    set('e-ca-email', ct.administracion?.email || '');
    set('e-ca-tel',   ct.administracion?.tel   || '');
    set('e-cl-nom',   ct.legales?.nom   || '');
    set('e-cl-email', ct.legales?.email || '');
    set('e-cl-tel',   ct.legales?.tel   || '');
    // Restore logo
    restoreLogo(p.logo);

    // Restore module state
    if (p.modules) {
        p.modules.forEach(pm => {
            modOn[pm.id]    = pm.on !== false;
            sesItems[pm.id] = (pm.items  || []).map(i => ({ ...i, id: i.id || uid() }));
            sesFiles[pm.id] = (pm.files  || []).map(f => ({ ...f, id: f.id || uid() }));
            sesNotes[pm.id] = pm.notes   || '';
            sesProvs[pm.id] = (pm.proveedores || []).map(p => ({ ...p, id: p.id || uid() }));
        });
        // Re-render module list (includes notes textareas)
        document.getElementById('mod-list').innerHTML = cfg.modules.map(m => vModRow(m)).join('');
        // Restore populated styling on notes textareas
        cfg.modules.forEach(m => {
            if (sesNotes[m.id]) {
                const ta = document.getElementById(`mn-${m.id}`);
                if (ta) { ta.classList.add('populated'); ta.style.height = Math.min(ta.scrollHeight, 280) + 'px'; }
            }
        });
    }
    calcEst();
}

// ─── Logo upload ───
function handleLogoUpload(input) {
    const file = input.files[0];
    if (!file) return;
    const isImg = file.type.startsWith('image/');
    const reader = new FileReader();
    reader.onload = e => {
        sesLogo = { name: file.name, dataUrl: e.target.result, isImg };
        const wrap = document.getElementById('logo-preview-wrap');
        const img  = document.getElementById('logo-preview-img');
        const zone = document.getElementById('logo-drop-zone');
        if (isImg) {
            img.src = e.target.result;
            wrap.style.display = 'block';
            zone.style.display = 'none';
        } else {
            // PDF — show name badge instead
            wrap.style.display = 'none';
            zone.innerHTML = `📄 <strong>${esc(file.name)}</strong><br><span style="font-size:11px;color:#888">PDF cargado</span> <span onclick="clearLogo()" style="cursor:pointer;color:#dc2626;font-size:12px;margin-left:6px">✕ quitar</span>`;

// ─── Save presupuesto ───
function guardar(status) {
    const cliente   = document.getElementById('e-cli')?.value?.trim();
    const proyecto  = document.getElementById('e-pro')?.value?.trim();
    const metros    = parseFloat(document.getElementById('e-m2')?.value) || 0;
    const tipo      = document.getElementById('e-tipo')?.value;
    const ubicacion = document.getElementById('e-ubic')?.value?.trim();
    const notas     = document.getElementById('e-notas')?.value?.trim();
    const assignedTo= document.getElementById('e-asignado')?.value || '';
    const contacts  = {
        comercial:      { nom: document.getElementById('e-cc-nom')?.value?.trim()||'', email: document.getElementById('e-cc-email')?.value?.trim()||'', tel: document.getElementById('e-cc-tel')?.value?.trim()||'' },
        administracion: { nom: document.getElementById('e-ca-nom')?.value?.trim()||'', email: document.getElementById('e-ca-email')?.value?.trim()||'', tel: document.getElementById('e-ca-tel')?.value?.trim()||'' },
        legales:        { nom: document.getElementById('e-cl-nom')?.value?.trim()||'', email: document.getElementById('e-cl-email')?.value?.trim()||'', tel: document.getElementById('e-cl-tel')?.value?.trim()||'' },
    };

    if (!cliente)  { toast('⚠️ Completá el nombre del cliente');  return; }
    if (!proyecto) { toast('⚠️ Completá el nombre del proyecto'); return; }

    const hasItems = cfg.modules.some(m => (sesItems[m.id]||[]).length > 0);
    if (metros <= 0 && !hasItems) {
        toast('⚠️ Ingresá los m² o agregá ítems en algún módulo');
        return;
    }

    const mg  = cfg.margen / 100;
    const mods = cfg.modules.map(m => ({
        ...m,
        on:          modOn[m.id] !== false,
        items:       JSON.parse(JSON.stringify(sesItems[m.id] || [])),
        files:       JSON.parse(JSON.stringify(sesFiles[m.id] || [])),
        notes:       sesNotes[m.id] || '',
        proveedores: JSON.parse(JSON.stringify(sesProvs[m.id] || [])),
        sub:         modTotal(m.id, metros),
        mode:        modMode(m.id),
    }));

    const baseTotal = mods.reduce((s,m) => s + m.sub, 0);
    const tcSave    = getTCForm();
    const moneda    = sesCurrency || 'USD';
    // Siempre guardamos totalUSD y totalARS independientemente de la moneda base
    const totalUSD  = moneda === 'ARS' ? baseTotal / tcSave : baseTotal;
    const totalARS  = moneda === 'ARS' ? baseTotal           : baseTotal * tcSave;
    const lo = totalUSD * (1-mg), hi = totalUSD * (1+mg);
    const now = new Date().toISOString();
    const actEntry = { id: uid(), userId: currentUser?.id || '', action: editId ? 'edit' : 'create', ts: now };

    if (editId) {
        const idx = plist.findIndex(p => p.id === editId);
        if (idx >= 0) {
            const prev = plist[idx];
            plist[idx] = { ...prev, cliente, proyecto, tipo, ubicacion, notas, metros, assignedTo,
                           contacts, logo: sesLogo, moneda,
                           totalUSD, loUSD:lo, hiUSD:hi, totalARS,
                           usdArs:tcSave, modules:mods, status, updAt:now,
                           activity: [...(prev.activity||[]), actEntry] };
        }
        saveDB(); toast('✅ Presupuesto actualizado');
        nav('detalle', editId);
    } else {
        const id = Date.now().toString();
        plist.push({ id, num:nextN(), cliente, proyecto, tipo, ubicacion, notas, metros, assignedTo,
                     contacts, logo: sesLogo, moneda,
                     totalUSD, loUSD:lo, hiUSD:hi, totalARS,
                     usdArs:tcSave, modules:mods, status, fecha:now, updAt:now,
                     attachments:[], comments:[], activity:[actEntry] });
        saveDB(); toast('✅ Presupuesto guardado');
        initSes();
        nav('historial');
    }
}

function filterTbl(q) {
    const ql = q.toLowerCase();
    const r  = plist.filter(p =>
        p.cliente.toLowerCase().includes(ql) ||
        p.proyecto.toLowerCase().includes(ql) ||
        String(p.num).includes(ql)
    );
    const b = document.getElementById('htbody');
    if (b) b.innerHTML = [...r].reverse().map(rHist).join('');
}

function startEdit(id, scrollToModules) {
    initSes();
    editId = id;
    nav('estimador', id);
    if (scrollToModules) {
        setTimeout(() => {
            const el = document.getElementById('est-modulos');
            if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }, 80);
    }
}

function startEditModule(presupId, modId) {
    initSes();
    editId = presupId;
    nav('estimador', presupId);
    setTimeout(() => {
        // Expand the module first
        if (!modExpand[modId]) toggleExpand(modId);
        // Then scroll the .content container to that module row
        setTimeout(() => {
            const content = document.querySelector('.content');
            const modRow  = document.getElementById('mr-' + modId);
            if (content && modRow) {
                const top = modRow.getBoundingClientRect().top
                          - content.getBoundingClientRect().top
                          + content.scrollTop
                          - 16; // small top padding
                content.scrollTo({ top, behavior: 'smooth' });
            }
        }, 60);
    }, 100);
}

function delP(id) {
    if (!confirm('¿Eliminar este presupuesto? Esta acción no se puede deshacer.')) return;
    plist = plist.filter(p => p.id !== id);
    saveDB(); toast('🗑️ Eliminado'); nav('historial');
}

function liveSubDet(itemId, presupId) {
    const row = document.getElementById('dmi-row-' + itemId);
    if (!row) return;
    const qty   = parseFloat(row.querySelector('[data-field="qty"]')?.value)   || 0;
    const price = parseFloat(row.querySelector('[data-field="price"]')?.value) || 0;
    const sub   = qty * price;
    const subEl = document.getElementById('dmi-sub-' + itemId);
    const p     = plist.find(x => x.id === presupId);
    if (subEl && p) subEl.textContent = fPriP(sub, p);
}

function saveDetItem(presupId, modId, itemId, field, rawVal) {
    const pi  = plist.findIndex(x => x.id === presupId);
    if (pi < 0) return;
    const mod  = (plist[pi].modules || []).find(m => m.id === modId);
    if (!mod)  return;
    const item = (mod.items || []).find(it => it.id === itemId);
    if (!item) return;
    item[field] = (field === 'qty' || field === 'priceUSD') ? (parseFloat(rawVal) || 0) : rawVal;
    // Recalc module sub
    mod.sub = (mod.items||[]).reduce((s,it) => s + (parseFloat(it.qty)||0)*(parseFloat(it.priceUSD)||0), 0);
    _recalcPresupTotals(pi);
    saveDB();
    // Update module total badge
    const p = plist[pi];
    const totEl = document.getElementById('dm-tot-' + modId);
    if (totEl) totEl.innerHTML = `<div class="det-mod-usd">${fPriP(mod.sub,p)}</div><div class="det-mod-ars">${fSecP(mod.sub,p)}</div>`;
    updateResultPanel(presupId);
}

function addDetItem(presupId, modId) {
    const pi  = plist.findIndex(x => x.id === presupId);
    if (pi < 0) return;
    const mod = (plist[pi].modules||[]).find(m => m.id === modId);
    if (!mod)  return;
    if (!mod.items) mod.items = [];
    const newItem = { id: Date.now().toString(36)+Math.random().toString(36).slice(2,5), desc:'', qty:1, unit:'gl', priceUSD:0 };
    mod.items.push(newItem);
    saveDB();
    const tbody = document.getElementById('dmi-tbody-' + modId);
    const p     = plist[pi];
    if (tbody) {
        tbody.insertAdjacentHTML('beforeend', vDetItemRow(newItem, mod.items.length-1, modId, p));
        // Focus desc input of new row
        const newRow = document.getElementById('dmi-row-' + newItem.id);
        if (newRow) newRow.querySelector('[data-field="desc"]')?.focus();
    }
}

function rmDetItem(presupId, modId, itemId) {
    const pi  = plist.findIndex(x => x.id === presupId);
    if (pi < 0) return;
    const mod = (plist[pi].modules||[]).find(m => m.id === modId);
    if (!mod)  return;
    mod.items = (mod.items||[]).filter(it => it.id !== itemId);
    mod.sub   = (mod.items||[]).reduce((s,it) => s + (parseFloat(it.qty)||0)*(parseFloat(it.priceUSD)||0), 0);
    _recalcPresupTotals(pi);
    saveDB();
    document.getElementById('dmi-row-' + itemId)?.remove();
    const p = plist[pi];
    const totEl = document.getElementById('dm-tot-' + modId);
    if (totEl) totEl.innerHTML = `<div class="det-mod-usd">${fPriP(mod.sub,p)}</div><div class="det-mod-ars">${fSecP(mod.sub,p)}</div>`;
    updateResultPanel(presupId);
}

function _recalcPresupTotals(pi) {
    const p      = plist[pi];
    const tc     = p.usdArs || cfg.usdArs || 1;
    const isARS  = (p.moneda||'USD') === 'ARS';
    const mg     = (p.margen || cfg.margen || 10) / 100;
    const base   = (p.modules||[]).reduce((s,m) => s + (m.sub||0), 0);
    p.totalUSD   = isARS ? base/tc : base;
    p.totalARS   = isARS ? base    : base*tc;
    p.loUSD      = p.totalUSD * (1 - mg);
    p.hiUSD      = p.totalUSD * (1 + mg);
    p.updatedAt  = new Date().toISOString();
}

function updateResultPanel(presupId) {
    const p = plist.find(x => x.id === presupId);
    if (!p) return;
    const q = sel => document.querySelector(sel);
    const rVal = q('.r-val');          if (rVal)      rVal.textContent      = fPriP(priAmtP(p), p);
    const rRng = q('.r-range');        if (rRng)      rRng.textContent      = `Rango: ${fPriP(loAmtP(p),p)} — ${fPriP(hiAmtP(p),p)}`;
    const rAV  = q('.r-ars-val');      if (rAV)       rAV.textContent       = fSecP(priAmtP(p), p);
    const rAR  = q('.r-ars-range');    if (rAR)       rAR.textContent       = `${fSecP(loAmtP(p),p)} — ${fSecP(hiAmtP(p),p)}`;
}

const fDateTime = s => {
    const d = new Date(s);
    return d.toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit'}) + ' ' +
           d.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
};

function renderComments(p) {
    const comments = p.comments || [];
    if (!comments.length) return `<div style="font-size:14px;color:#ccc;text-align:center;padding:12px 0">Sin comentarios aún. Sé el primero en comentar.</div>`;
    return comments.map(c => {
        const u    = getUser(c.userId);
        const mine = currentUser && c.userId === currentUser.id;
        const textHtml = esc(c.text).replace(/@(\w+)/g, (_, handle) => {
            const found = users.find(u => u.name.replace(/\s+/g,'').toLowerCase() === handle.toLowerCase()
                                       || u.name.split(' ')[0].toLowerCase() === handle.toLowerCase());
            return found ? `<span class="mention-tag">@${esc(found.name)}</span>` : `@${handle}`;
        });
        return `<div class="comment-item ${mine?'comment-mine':''}">
            ${mine ? '' : (u ? userAvatar(u,'sm') : '')}
            <div class="comment-body">
                <div class="comment-header">
                    <span class="comment-name">${u ? esc(u.name) : 'Desconocido'}</span>
                    <span class="comment-ts">${fDateTime(c.ts)}</span>
                    ${mine ? `<span class="comment-rm" onclick="rmComment('${p.id}','${c.id}')">✕</span>` : ''}
                </div>
                <div class="comment-text">${textHtml}</div>
            </div>
            ${mine ? (u ? userAvatar(u,'sm') : '') : ''}
        </div>`;
    }).join('');
}

function addComment(presupId) {
    if (!currentUser) { toast('⚠️ Seleccioná un usuario primero'); return; }
    const ta = document.getElementById(`ci-${presupId}`);
    const text = ta?.value?.trim();
    if (!text) return;

    const p = plist.find(x => x.id === presupId);
    if (!p) return;

    // Extract @mentions → match by first name or full name (no spaces)
    const mentions = [];
    const re = /@(\S+)/g;
    let m;
    while ((m = re.exec(text)) !== null) {
        const handle = m[1].toLowerCase();
        const found = users.find(u =>
            u.name.replace(/\s+/g,'').toLowerCase() === handle ||
            u.name.split(' ')[0].toLowerCase() === handle
        );
        if (found && !mentions.includes(found.id)) mentions.push(found.id);
    }

    const comment = { id: uid(), userId: currentUser.id, text, mentions, read: [currentUser.id], ts: new Date().toISOString() };
    p.comments = [...(p.comments||[]), comment];

    // Add activity entry
    const actEntry = { id: uid(), userId: currentUser.id, action: 'comment', ts: comment.ts };
    p.activity = [...(p.activity||[]), actEntry];

    saveDB();
    ta.value = '';
    ta.style.height = 'auto';

    // Refresh comment thread
    const ct = document.getElementById(`ct-${presupId}`);
    if (ct) ct.innerHTML = renderComments(p);

    // Scroll to bottom
    ct?.lastElementChild?.scrollIntoView({ behavior:'smooth' });

    renderTopbarUser();
    if (mentions.length) toast(`💬 Comentario enviado — se mencionó a ${mentions.length} persona(s)`);
    else toast('💬 Comentario agregado');
}

function rmComment(presupId, commentId) {
    const p = plist.find(x => x.id === presupId);
    if (!p) return;
    p.comments = (p.comments||[]).filter(c => c.id !== commentId);
    saveDB();
    const ct = document.getElementById(`ct-${presupId}`);
    if (ct) ct.innerHTML = renderComments(p);
}

function markMentionsRead(presupId) {
    if (!currentUser) return;
    const p = plist.find(x => x.id === presupId);
    if (!p) return;
    let changed = false;
    (p.comments||[]).forEach(c => {
        if ((c.mentions||[]).includes(currentUser.id) && !(c.read||[]).includes(currentUser.id)) {
            c.read = [...(c.read||[]), currentUser.id];
            changed = true;
        }
    });
    if (changed) { saveDB(); renderTopbarUser(); }
}

// ─── @mention autocomplete ───
let mentionQuery = '';
let mentionStart = -1;

function onCommentInput(presupId, ta) {
    // Auto-resize textarea
    ta.style.height = 'auto';
    ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';

    const val = ta.value;
    const pos = ta.selectionStart;
    const before = val.slice(0, pos);
    const atIdx = before.lastIndexOf('@');

    const sugg = document.getElementById(`ms-${presupId}`);
    if (!sugg) return;

    if (atIdx >= 0 && !before.slice(atIdx+1).includes(' ')) {
        mentionQuery = before.slice(atIdx+1).toLowerCase();
        mentionStart = atIdx;
        const matches = activeUsers().filter(u =>
            u.name.toLowerCase().includes(mentionQuery) && u.id !== currentUser?.id
        ).slice(0, 5);

        if (matches.length) {
            sugg.style.display = 'block';
            sugg.innerHTML = matches.map(u => `
                <div class="mention-sug-item" onclick="insertMention('${presupId}','${u.name}')">
                    ${userAvatar(u,'sm')}
                    <span class="mention-sug-name">${esc(u.name)}</span>
                    <span class="mention-sug-role">${roleLbl(u.role)}</span>
                </div>`).join('');
        } else {
            sugg.style.display = 'none';
        }
    } else {
        sugg.style.display = 'none';
        mentionStart = -1;
    }
}

function insertMention(presupId, name) {
    const ta = document.getElementById(`ci-${presupId}`);
    const sugg = document.getElementById(`ms-${presupId}`);
    if (!ta) return;
    const val = ta.value;
    const firstName = name.split(' ')[0];
    ta.value = val.slice(0, mentionStart) + '@' + firstName + ' ' + val.slice(ta.selectionStart);
    sugg.style.display = 'none';
    ta.focus();
    const newPos = mentionStart + firstName.length + 2;
    ta.setSelectionRange(newPos, newPos);
}

// ─── @mention en notas de módulo ───
let modMentionStart = {};   // { modId: number }
let modMentionQuery = {};   // { modId: string }

function onModNoteInput(modId, ta) {
    // Persist note value
    sesNotes[modId] = ta.value;
    ta.classList.toggle('populated', ta.value.length > 0);
    ta.style.height = 'auto';
    ta.style.height = Math.min(ta.scrollHeight, 280) + 'px';

    const val = ta.value;
    const pos = ta.selectionStart;
    const before = val.slice(0, pos);
    const atIdx = before.lastIndexOf('@');
    const sugg = document.getElementById(`mn-sugg-${modId}`);
    if (!sugg) return;

    if (atIdx >= 0 && !before.slice(atIdx + 1).includes(' ')) {
        modMentionQuery[modId] = before.slice(atIdx + 1).toLowerCase();
        modMentionStart[modId] = atIdx;
        const matches = activeUsers().filter(u =>
            u.name.toLowerCase().includes(modMentionQuery[modId])
        ).slice(0, 5);

        if (matches.length) {
            sugg.style.display = 'block';
            sugg.innerHTML = matches.map(u => `
                <div class="mention-sug-item" onclick="insertModMention('${modId}','${u.name}')">
                    ${userAvatar(u, 'sm')}
                    <span class="mention-sug-name">${esc(u.name)}</span>
                    <span class="mention-sug-role">${roleLbl(u.role)}</span>
                </div>`).join('');
        } else {
            sugg.style.display = 'none';
        }
    } else {
        sugg.style.display = 'none';
        modMentionStart[modId] = -1;
    }
}

function insertModMention(modId, name) {
    const ta   = document.getElementById(`mn-${modId}`);
    const sugg = document.getElementById(`mn-sugg-${modId}`);
    if (!ta) return;
    const firstName = name.split(' ')[0];
    const start = modMentionStart[modId] ?? -1;
    ta.value = ta.value.slice(0, start) + '@' + firstName + ' ' + ta.value.slice(ta.selectionStart);
    sesNotes[modId] = ta.value;
    sugg.style.display = 'none';
    ta.focus();
    const newPos = start + firstName.length + 2;
    ta.setSelectionRange(newPos, newPos);
}

// ─── Attachments ───
function attHTML(p) {
    if (!p.attachments?.length) return '';
    return `<div class="att-list">${p.attachments.map((a,i) => `
        <div class="att-item">
            <span>${fileIco(a.name)}</span><span>${esc(a.name)}</span>
            <span style="color:#bbb">${fSize(a.size)}</span>
            <span class="att-rm" onclick="rmAtt('${p.id}',${i})">×</span>
        </div>`).join('')}</div>`;
}

function addFiles(id, inp) {
    const p = plist.find(x => x.id === id);
    if (!p) return;
    if (!p.attachments) p.attachments = [];
    Array.from(inp.files).forEach(f =>
        p.attachments.push({ name:f.name, size:f.size, type:f.type, date:new Date().toISOString() })
    );
    saveDB();
    document.getElementById(`att-${id}`).innerHTML = attHTML(p);
    toast(`✅ ${inp.files.length} archivo(s) adjuntado(s)`);
    inp.value = '';
}

function rmAtt(id, idx) {
    const p = plist.find(x => x.id === id);
    if (!p) return;
    p.attachments.splice(idx, 1);
    saveDB();
    document.getElementById(`att-${id}`).innerHTML = attHTML(p);
}

function setStatus(id, s) {
    const p = plist.find(x => x.id === id);
    if (p) { p.status = s; saveDB(); nav('detalle', id); toast(`Estado → ${statusLbl(s)}`); }
}

function dupP(id) {
    const o = plist.find(x => x.id === id);
    if (!o) return;
    const np = JSON.parse(JSON.stringify(o));
    np.id = Date.now().toString(); np.num = nextN();
    np.fecha = new Date().toISOString(); np.status = 'borrador'; np.attachments = [];
    plist.push(np); saveDB(); toast('📋 Duplicado');
    nav('detalle', np.id);
}

}

function reactivateUser(userId) {

                        <span style="font-size:13px;color:#aaa">en <strong>#${p.num} ${esc(p.proyecto)}</strong></span>
                        <span style="font-size:12px;color:#ccc;margin-left:auto">${fDateTime(c.ts)}</span>
                        ${!isRead ? '<span style="width:8px;height:8px;border-radius:50%;background:#2563eb;flex-shrink:0"></span>' : ''}

function exportJSON() {
    const b = new Blob([JSON.stringify({presupuestos:plist,config:cfg,exportedAt:new Date().toISOString()},null,2)],{type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(b);
    a.download = `mz-presupuestos-${new Date().toISOString().slice(0,10)}.json`;
    a.click(); URL.revokeObjectURL(a.href);
}

function importJSON(inp) {
    const f = inp.files[0]; if (!f) return;
    new FileReader().onload = e => {
        try {
            const d = JSON.parse(e.target.result);
            if (d.presupuestos) { plist = d.presupuestos; saveDB(); }
            if (d.config)       { cfg   = d.config;       saveCFG(); }
            toast('✅ Datos importados'); nav('dashboard');
        } catch { toast('❌ Error al leer el archivo'); }
    };
    const r = new FileReader();
    r.onload = e => {
        try {
            const d = JSON.parse(e.target.result);
            if (d.presupuestos) { plist = d.presupuestos; saveDB(); }
            if (d.config)       { cfg   = d.config;       saveCFG(); }
            toast('✅ Datos importados'); nav('dashboard');
        } catch { toast('❌ Error al leer el archivo'); }
    };
    r.readAsText(f); inp.value = '';
}

function clearAll() {
    if (!confirm('⚠️ Esto eliminará TODOS los presupuestos. ¿Confirmás?')) return;
    plist = []; saveDB(); toast('🗑️ Datos eliminados'); nav('dashboard');
}

// ═══════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════
function statusLbl(s) {
    return { abierto:'Abierto', presentado:'Presentado', aprobado:'Aprobado', perdido:'Perdido' }[s] || s;
}
function tipoLbl(t) {
    return {local:'Local Comercial',oficina:'Oficina / Corp.',gastronomia:'Gastronomía',otro:'Otro'}[t] || t || '—';
}
function bHTML(s, big=false) {
    const sz = big ? 'font-size:16px;padding:6px 16px' : '';
    return `<span class="badge b-${s}" style="${sz}">${statusLbl(s)}</span>`;
}
function fileIco(n) {
    const e = (n||'').split('.').pop().toLowerCase();
    if (['jpg','jpeg','png','gif','webp'].includes(e)) return '🖼️';
    if (e==='pdf')  return '📄';
    if (['xlsx','xls','csv'].includes(e)) return '📊';
    if (['dwg','dxf'].includes(e)) return '📐';
    return '📎';
}
function fSize(b) {
    if (!b) return '';
    if (b<1024)    return b+' B';
    if (b<1048576) return Math.round(b/1024)+' KB';
    return (b/1048576).toFixed(1)+' MB';
}
function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function toast(msg) {
    document.querySelectorAll('.toast').forEach(t=>t.remove());
    const t = document.createElement('div');
    t.className = 'toast'; t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(()=>t.remove(), 2800);
}

    const switcher = `
        <div style="display:flex;align-items:center;gap:6px;cursor:pointer" onclick="showUserPicker(true)" title="Cambiar usuario">
            ${currentUser ? userAvatar(currentUser) : '<div class="u-av" style="background:#ccc">?</div>'}
            ${unread > 0 ? `<span class="mention-badge">${unread > 9 ? '9+' : unread}</span>` : ''}
        </div>`;
    const existing = actions.querySelector('.user-switcher');
    if (existing) { existing.outerHTML = `<div class="user-switcher">${switcher}</div>`; }
    else { actions.insertAdjacentHTML('afterbegin', `<div class="user-switcher">${switcher}</div>`); }

    // Update sidebar badge
    const sb = document.getElementById('sb-badge');
    if (sb) {
        if (unread > 0) { sb.style.display = ''; sb.textContent = unread > 9 ? '9+' : unread; }
        else { sb.style.display = 'none'; }
    }
}

function toggleSidebar() {
    const sb  = document.getElementById('sidebar');
    const ov  = document.getElementById('sb-overlay');
    const open = sb.classList.toggle('open');
    ov.classList.toggle('open', open);
    document.body.style.overflow = open ? 'hidden' : '';
}
function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sb-overlay').classList.remove('open');
    document.body.style.overflow = '';
}

//  EXCEL EXPORT
// ═══════════════════════════════════════════════════
async function exportExcel(presupId) {
    const p = plist.find(x => x.id === presupId);
    if (!p) return;

    toast('⏳ Generando Excel…');

    // Lazy-load ExcelJS
    if (!window.ExcelJS) {
        await new Promise((res, rej) => {
            const sc = document.createElement('script');
            sc.src = 'https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js';
            sc.onload = res; sc.onerror = rej;
            document.head.appendChild(sc);
        });
    }

    const wb   = new ExcelJS.Workbook();
    wb.creator = 'MZ Latam';
    wb.created = new Date();
    const tc      = p.usdArs || cfg.usdArs;
    const xlMoneda = p.moneda || 'USD';
    const mods = (p.modules || []).filter(m => m.on !== false && m.sub > 0);
    const asg  = p.assignedTo ? (getUser(p.assignedTo)?.name || '—') : '—';

    const stripEmoji = str => String(str||'').replace(/[\u{1F000}-\u{1FFFF}]|[\u{2600}-\u{27BF}]|[\u{FE00}-\u{FEFF}]|[\u{1F300}-\u{1F9FF}]/gu, '').trim();
    const argb  = hex => 'FF' + hex.replace('#','').toUpperCase();
    const fmtN  = (v, isusd) => isusd ? 'USD #,##0' : '$ #,##0';
    const fv    = v => parseFloat(v)||0;

    // Style helpers
    const titleStyle = bg => ({
        font:      { bold:true, size:13, color:{ argb:'FFFFFFFF' } },
        fill:      { type:'pattern', pattern:'solid', fgColor:{ argb: bg || 'FF0A0A0A' } },
        alignment: { horizontal:'left', vertical:'middle' }
    });
    const modHeaderStyle = (c) => ({
        font:      { bold:true, size:11, color:{ argb: argb(c.text) } },
        fill:      { type:'pattern', pattern:'solid', fgColor:{ argb: argb(c.bg) } },
        border:    { left:{ style:'medium', color:{ argb: argb(c.border) } } },
        alignment: { vertical:'middle' }
    });
    const colHeaderStyle = (c) => ({
        font:      { bold:true, size:10, color:{ argb:'FF444444' } },
        fill:      { type:'pattern', pattern:'solid', fgColor:{ argb:'FFF5F5F5' } },
        border: {
            bottom: { style:'thin', color:{ argb:'FFD0D0D0' } },
            left:   { style:'medium', color:{ argb: argb(c.border) } }
        },
        alignment: { horizontal:'center', vertical:'middle' }
    });
    const itemStyle = (c, isAlt) => ({
        fill:   { type:'pattern', pattern:'solid', fgColor:{ argb: isAlt ? 'FFF9F9F9' : 'FFFFFFFF' } },
        border: { left:{ style:'medium', color:{ argb: argb(c.border) } }, bottom:{ style:'hair', color:{argb:'FFEEEEEE'} } },
        alignment: { vertical:'middle' }
    });
    const subtotalStyle = (c) => ({
        font:   { bold:true, size:10, color:{ argb: argb(c.text) } },
        fill:   { type:'pattern', pattern:'solid', fgColor:{ argb: argb(c.bg) } },
        border: { left:{ style:'medium', color:{ argb: argb(c.border) } }, top:{ style:'thin', color:{ argb: argb(c.border) } } }
    });
    const provHeaderStyle = { font:{ italic:true, size:9, color:{argb:'FF777777'} }, fill:{ type:'pattern', pattern:'solid', fgColor:{argb:'FFF8F8F8'} } };
    const provRowStyle    = { font:{ size:10 }, fill:{ type:'pattern', pattern:'solid', fgColor:{argb:'FFFAFAFA'} } };
    const totalStyle = {
        font:   { bold:true, size:11, color:{ argb:'FF0A0A0A' } },
        fill:   { type:'pattern', pattern:'solid', fgColor:{ argb:'FFF0F0F0' } },
        border: { top:{ style:'double', color:{argb:'FF0A0A0A'} } }
    };
    const infoLabelStyle = { font:{ bold:true, size:10, color:{argb:'FF555555'} }, fill:{ type:'pattern', pattern:'solid', fgColor:{argb:'FFF5F5F5'} } };
    const infoValStyle   = { font:{ size:10 }, alignment:{ wrapText:true } };

    const applyStyle = (row, styleObj) => {
        row.eachCell({ includeEmpty:true }, cell => { Object.assign(cell, styleObj); });
        row.height = 18;
    };
    const applyStyleCols = (row, styles) => {
        styles.forEach(([colIdx, styleObj]) => {
            const cell = row.getCell(colIdx);
            Object.assign(cell, styleObj);
        });
    };

    // ── HOJA 1: RESUMEN ──────────────────────────────
    const ws1 = wb.addWorksheet('Resumen');
    ws1.columns = [
        {key:'a', width:28}, {key:'b', width:28}, {key:'c', width:4},
        {key:'d', width:20}, {key:'e', width:28}, {key:'f', width:18}, {key:'g', width:18}
    ];

    // Title
    const t1 = ws1.addRow(['MZ LATAM — PRESUPUESTO #' + p.num]);
    ws1.mergeCells(t1.number, 1, t1.number, 7);
    t1.height = 28;
    t1.getCell(1).style = { font:{bold:true,size:14,color:{argb:'FFFFFFFF'}}, fill:{type:'pattern',pattern:'solid',fgColor:{argb:'FF0A0A0A'}}, alignment:{horizontal:'left',vertical:'middle'} };

    ws1.addRow([]);

    // Project info block
    const infoRows = [
        ['Cliente', p.cliente, '', 'Proyecto', p.proyecto],
        ['Tipo', tipoLbl(p.tipo), '', 'Ubicacion', p.ubicacion||'—'],
        ['Lider de proyecto', asg, '', 'Estado', statusLbl(p.status)],
        ['Fecha', fDate(p.fecha), '', 'TC', '1 USD = ARS ' + fmt(tc)],
        ['Margen MZ', (p.margen||cfg.margen) + '%', '', 'Metros cuadrados', (p.metros||0) + ' m2'],
    ];
    infoRows.forEach(data => {
        const r = ws1.addRow(data);
        r.height = 17;
        r.getCell(1).style = infoLabelStyle;
        r.getCell(2).style = infoValStyle;
        r.getCell(4).style = infoLabelStyle;
        r.getCell(5).style = infoValStyle;
    });

    ws1.addRow([]);

    // Desglose header
    const dh = ws1.addRow(['Modulo','Items','Total USD','Total ARS','Proveedor asignado','Estado','Monto cotizado']);
    dh.height = 17;
    dh.eachCell(cell => {
        cell.style = { font:{bold:true,size:10,color:{argb:'FFFFFFFF'}}, fill:{type:'pattern',pattern:'solid',fgColor:{argb:'FF333333'}}, alignment:{horizontal:'center',vertical:'middle'} };
    });
    dh.getCell(1).alignment = { horizontal:'left', vertical:'middle' };

    mods.forEach((m, i) => {
        const c = MOD_PALETTE[i % MOD_PALETTE.length];
        const pv = (m.proveedores||[])[0];
        const mSubUSD = xlMoneda==='ARS' ? fv(m.sub)/tc : fv(m.sub);
        const mSubARS = xlMoneda==='ARS' ? fv(m.sub)    : fv(m.sub)*tc;
        const r = ws1.addRow([
            stripEmoji(m.name),
            m.mode === 'items' ? (m.items||[]).length : '—',
            mSubUSD,
            mSubARS,
            pv?.supplierName || '—',

            pv?.monto ? fv(pv.monto) : '—',
        ]);
        r.height = 17;
        r.getCell(1).style = { font:{bold:true,size:10,color:{argb:argb(c.text)}}, fill:{type:'pattern',pattern:'solid',fgColor:{argb:argb(c.bg)}}, border:{left:{style:'medium',color:{argb:argb(c.border)}}} };
        [2,3,4,5,6,7].forEach(col => {
            r.getCell(col).style = { fill:{type:'pattern',pattern:'solid',fgColor:{argb:argb(c.bg)}}, font:{size:10} };
        });
        r.getCell(3).numFmt = '"USD "#,##0';
        r.getCell(4).numFmt = '"$ "#,##0';
        if (pv?.monto) r.getCell(7).numFmt = pv.moneda==='USD' ? '"USD "#,##0' : '"$ "#,##0';
    });

    ws1.addRow([]);
    const tot1 = ws1.addRow(['TOTAL COSTO MZ', '', fv(p.totalUSD), fv(p.totalARS)]);
    const tot2 = ws1.addRow(['PRECIO AL CLIENTE  (+'+ (p.margen||cfg.margen) +'%)', '', fv(p.hiUSD), fv(p.hiUSD * tc)]);
    const tot3 = ws1.addRow(['GANANCIA MZ', '', fv(p.hiUSD - p.totalUSD), fv((p.hiUSD - p.totalUSD)*tc)]);
    [tot1,tot2,tot3].forEach((r,i) => {
        r.height = 18;
        r.getCell(1).style = totalStyle;
        r.getCell(3).style = { ...totalStyle, numFmt:'"USD "#,##0', font:{bold:true,size:11} };
        r.getCell(4).style = { ...totalStyle, numFmt:'"$ "#,##0', font:{bold:true,size:11} };
    });
    tot2.getCell(1).style = { ...totalStyle, fill:{type:'pattern',pattern:'solid',fgColor:{argb:'FFE8F5E9'}}, font:{bold:true,size:11,color:{argb:'FF15803D'}} };
    tot2.getCell(3).style = { font:{bold:true,size:11,color:{argb:'FF15803D'}}, numFmt:'"USD "#,##0' };
    tot2.getCell(4).style = { font:{bold:true,size:11,color:{argb:'FF15803D'}}, numFmt:'"$ "#,##0' };

    if (p.notas) { ws1.addRow([]); ws1.addRow(['Notas:', stripEmoji(p.notas)]); }

    // ── HOJA 2: DETALLE POR MODULO ────────────────────
    const ws2 = wb.addWorksheet('Detalle Modulos');
    ws2.columns = [
        {key:'a',width:10},{key:'b',width:38},{key:'c',width:10},
        {key:'d',width:10},{key:'e',width:16},{key:'f',width:16},{key:'g',width:16}
    ];

    const t2 = ws2.addRow(['MZ LATAM — DETALLE DE MODULOS — PRESUPUESTO #' + p.num]);
    ws2.mergeCells(t2.number,1,t2.number,7);
    t2.height = 26;
    t2.getCell(1).style = { font:{bold:true,size:13,color:{argb:'FFFFFFFF'}}, fill:{type:'pattern',pattern:'solid',fgColor:{argb:'FF0A0A0A'}}, alignment:{horizontal:'left',vertical:'middle'} };

    const t2b = ws2.addRow(['Cliente: ' + p.cliente + '   |   Proyecto: ' + p.proyecto + '   |   TC: 1 USD = ARS ' + fmt(tc)]);
    ws2.mergeCells(t2b.number,1,t2b.number,7);
    t2b.height = 16;
    t2b.getCell(1).style = { font:{italic:true,size:10,color:{argb:'FF666666'}}, fill:{type:'pattern',pattern:'solid',fgColor:{argb:'FFF5F5F5'}} };

    mods.forEach((m, mi) => {
        const c   = MOD_PALETTE[mi % MOD_PALETTE.length];
        const num = mi + 1;

        ws2.addRow([]);

        // Module header
        const mhRow = ws2.addRow([num + '.', stripEmoji(m.name).toUpperCase()]);

        mhRow.height = 20;
        mhRow.getCell(1).style = modHeaderStyle(c);

        // Column headers
        const secMoneda = xlMoneda === 'ARS' ? 'USD' : 'ARS';

        chRow.height = 16;
        chRow.eachCell(cell => { cell.style = colHeaderStyle(c); });

        if (m.mode === 'items' && m.items?.length > 0) {
            m.items.forEach((item, ii) => {
                const sub = fv(item.qty) * fv(item.priceUSD);
                const subSec = xlMoneda==='ARS' ? sub/tc : sub*tc;
                const ir  = ws2.addRow([num + '.' + (ii+1), stripEmoji(item.desc||'—'), fv(item.qty), item.unit||'', fv(item.priceUSD), fv(sub), subSec]);
                ir.height = 16;
                const st = itemStyle(c, ii%2===1);
                ir.eachCell(cell => { cell.style = st; });
                ir.getCell(3).alignment = { horizontal:'center' };
                ir.getCell(4).alignment = { horizontal:'center' };
                const priNFmt = xlMoneda==='ARS' ? '"$ "#,##0' : '"USD "#,##0';
                const secNFmt = xlMoneda==='ARS' ? '"USD "#,##0' : '"$ "#,##0';
                ir.getCell(5).numFmt = priNFmt;
                ir.getCell(6).numFmt = priNFmt;
                ir.getCell(7).numFmt = secNFmt;

        } else {

            const ir = ws2.addRow([num+'.1', stripEmoji(m.name), fv(p.metros), 'm2', fv(m.costUSD||0), sub0, sec0]);
            ir.height = 16;
            ir.eachCell(cell => { cell.style = itemStyle(c, false); });
            const priNFmt0 = xlMoneda==='ARS' ? '"$ "#,##0' : '"USD "#,##0';
            const secNFmt0 = xlMoneda==='ARS' ? '"USD "#,##0' : '"$ "#,##0';
            ir.getCell(5).numFmt = priNFmt0;
            ir.getCell(6).numFmt = priNFmt0;
            ir.getCell(7).numFmt = secNFmt0;
        }

        const secSub = xlMoneda==='ARS' ? fv(m.sub)/tc : fv(m.sub)*tc;
        const sr = ws2.addRow(['','SUBTOTAL ' + stripEmoji(m.name).toUpperCase(),'','','',fv(m.sub),secSub]);
        sr.height = 17;
        sr.eachCell(cell => { cell.style = subtotalStyle(c); });
        sr.getCell(6).numFmt = xlMoneda==='ARS' ? '"$ "#,##0' : '"USD "#,##0';
        sr.getCell(7).numFmt = xlMoneda==='ARS' ? '"USD "#,##0' : '"$ "#,##0';

                pvr.eachCell(cell => { cell.style = provRowStyle; });

        if (m.notes?.trim()) {

        {key:'d',width:16},{key:'e',width:20},{key:'f',width:10},{key:'g',width:30}

    const t3 = ws3.addRow(['MZ LATAM — RESUMEN PROVEEDORES — PRESUPUESTO #' + p.num]);
    ws3.mergeCells(t3.number,1,t3.number,7);
    t3.height = 24;
    t3.getCell(1).style = { font:{bold:true,size:13,color:{argb:'FFFFFFFF'}}, fill:{type:'pattern',pattern:'solid',fgColor:{argb:'FF0A0A0A'}}, alignment:{horizontal:'left',vertical:'middle'} };

    const t3b = ws3.addRow(['Cliente: ' + p.cliente + '   |   Proyecto: ' + p.proyecto]);
    ws3.mergeCells(t3b.number,1,t3b.number,7);
    t3b.getCell(1).style = { font:{italic:true,size:10,color:{argb:'FF666666'}}, fill:{type:'pattern',pattern:'solid',fgColor:{argb:'FFF5F5F5'}} };

    ws3.addRow([]);
    const ph = ws3.addRow(['Modulo','Proveedor','Contacto','Estado','Presupuesto original','Moneda','Nota / Plazo']);
    ph.height = 16;
    ph.eachCell(cell => { cell.style = { font:{bold:true,size:10,color:{argb:'FFFFFFFF'}}, fill:{type:'pattern',pattern:'solid',fgColor:{argb:'FF333333'}}, alignment:{horizontal:'center',vertical:'middle'} }; });
    ph.getCell(1).alignment = { horizontal:'left', vertical:'middle' };

    mods.forEach((m, i) => {
        const c = MOD_PALETTE[i % MOD_PALETTE.length];
        const provs = m.proveedores || [];
        if (provs.length === 0) {
            const r = ws3.addRow([stripEmoji(m.name),'Sin proveedor asignado','—','—','—','—','—']);
            r.height = 16;
            r.getCell(1).style = { font:{bold:true,size:10,color:{argb:argb(c.text)}}, fill:{type:'pattern',pattern:'solid',fgColor:{argb:argb(c.bg)}}, border:{left:{style:'medium',color:{argb:argb(c.border)}}} };
        } else {
            provs.forEach((pv, pi) => {
                const sup = getSupplier(pv.supplierId);
                const r = ws3.addRow([
                    pi===0 ? stripEmoji(m.name) : '',
                    pv.supplierName||'—',
                    sup?.contacto || sup?.tel || '—',
                    ESTADOS_PROV.find(e=>e.id===pv.estado)?.label || pv.estado,
                    pv.monto ? fv(pv.monto) : '—',
                    pv.moneda||'ARS',
                    (pv.plazo?fDate(pv.plazo):'—') + (pv.nota?' — '+stripEmoji(pv.nota):''),
                ]);
                r.height = 16;
                r.getCell(1).style = { font:{bold:true,size:10,color:{argb:argb(c.text)}}, fill:{type:'pattern',pattern:'solid',fgColor:{argb:argb(c.bg)}}, border:{left:{style:'medium',color:{argb:argb(c.border)}}} };
                [2,3,4,5,6,7].forEach(col => { r.getCell(col).style = { fill:{type:'pattern',pattern:'solid',fgColor:{argb:argb(c.bg)}}, font:{size:10} }; });
                if (pv.monto) r.getCell(5).numFmt = pv.moneda==='USD'?'"USD "#,##0':'"$ "#,##0';
            });
        }
    });

    ws3.addRow([]);
    const st1 = ws3.addRow(['TOTAL COSTO MZ','','','',fv(p.totalUSD),'USD','']);
    const st2 = ws3.addRow(['PRECIO AL CLIENTE (+'+(p.margen||cfg.margen)+'%)','','','',fv(p.hiUSD),'USD','']);
    [st1,st2].forEach(r => {
        r.height = 18;
        r.eachCell(cell => { cell.style = totalStyle; });
        r.getCell(5).numFmt = '"USD "#,##0';
    });

    // ── DESCARGA ──────────────────────────────────────
    const safeName = (p.cliente||'Cliente').replace(/[^a-z0-9áéíóúüñ ]/gi,'').trim().replace(/\s+/g,'_');
    const filename = `MZ_Presupuesto_${String(p.num).padStart(3,'0')}_${safeName}.xlsx`;
    const buffer = await wb.xlsx.writeBuffer();
    const blob   = new Blob([buffer], { type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
    const url    = URL.createObjectURL(blob);
    const a      = document.createElement('a');
    a.href = url; a.download = filename; a.click();
    URL.revokeObjectURL(url);
    toast('Excel generado: ' + filename);
}

function refreshDetalle(presupId) {
    const content = document.querySelector('.content');
    const scrollTop = content ? content.scrollTop : 0;
    document.getElementById('app').innerHTML = vDetalle(presupId);
    if (content) content.scrollTop = scrollTop;
    renderPLChart(presupId);
}

function renderPLChart(presupId) {
    const p = plist.find(x => x.id === presupId);
    if (!p) return;
    const canvas = document.getElementById('pl-chart-' + presupId);
    const legend = document.getElementById('pl-legend-' + presupId);
    if (!canvas || !legend) return;

    const tryRender = () => {
        if (typeof Chart === 'undefined') { setTimeout(tryRender, 150); return; }
        const mods   = (p.modules || []).filter(m => m.on !== false && m.sub > 0);
        const total  = priAmtP(p) || 0;
        const colors = ['#7c3aed','#0284c7','#16a34a','#ca8a04','#dc2626','#db2777','#ea580c','#0ea5e9'];

        // Destroy existing chart on this canvas if any
        const existing = Chart.getChart(canvas);
        if (existing) existing.destroy();

        new Chart(canvas, {
            type: 'doughnut',
            data: {
                labels: mods.map(m => m.name),
                datasets: [{
                    data: mods.map(m => m.sub),
                    backgroundColor: colors.slice(0, mods.length),
                    borderWidth: 3,
                    borderColor: '#fff',
                    hoverOffset: 8
                }]
            },
            options: {
                responsive: false,
                cutout: '58%',
                plugins: {
                    legend: { display: false },
                    tooltip: { callbacks: {
                        label: ctx => '  ' + ctx.label + ': ' + fPriP(ctx.raw, p) + ' (' + (total > 0 ? Math.round(ctx.raw / total * 100) : 0) + '%)'
                    }}
                }
            }
        });

        legend.innerHTML = mods.map((m, i) => {
            const pct = total > 0 ? Math.round(m.sub / total * 100) : 0;
            return '<div style="display:flex;align-items:center;gap:10px">' +
                '<span style="width:13px;height:13px;border-radius:3px;flex-shrink:0;background:' + colors[i % colors.length] + '"></span>' +
                '<div style="flex:1;min-width:0">' +
                    '<div style="font-size:14px;font-weight:600">' + esc(m.name) + '</div>' +
                    '<div style="font-size:13px;color:#666">' + fPriP(m.sub, p) + ' &nbsp;·&nbsp; <strong>' + pct + '%</strong></div>' +
                '</div></div>';
        }).join('');
    };
    tryRender();
}

function saveEditInfo(presupId) {
    const idx = plist.findIndex(x => x.id === presupId);
    if (idx === -1) return;
    const cli = document.getElementById('eim-cli').value.trim();
    const pro = document.getElementById('eim-pro').value.trim();
    if (!cli || !pro) { toast('❌ Cliente y Proyecto son obligatorios', 'error'); return; }
    plist[idx].cliente   = cli;
    plist[idx].proyecto  = pro;
    plist[idx].tipo      = document.getElementById('eim-tipo').value;
    plist[idx].ubicacion = document.getElementById('eim-ubic').value.trim();
    plist[idx].assignedTo = document.getElementById('eim-asignado').value;
    plist[idx].usdArs     = parseFloat(document.getElementById('eim-tc').value) || cfg.usdArs || 1;
    plist[idx].margen     = parseFloat(document.getElementById('eim-mg').value) || cfg.margen || 10;
    plist[idx].metros    = parseFloat(document.getElementById('eim-metros').value) || 0;
    plist[idx].notas     = document.getElementById('eim-notas').value.trim();
    // Re-run totals in case TC or margen changed
    const tc     = plist[idx].usdArs || cfg.usdArs || 1;
    const isARS  = (plist[idx].moneda||'USD') === 'ARS';
    const mg100  = (plist[idx].margen || cfg.margen || 10) / 100;
    let baseTotal = 0;
    (plist[idx].modules || []).forEach(m => {
        if (m.mode === 'm2') { m.sub = (m.costUSD || 0) * (plist[idx].metros || 0); }
        else { m.sub = (m.items || []).reduce((s, it) => s + ((parseFloat(it.qty)||0) * (parseFloat(it.priceUSD)||0)), 0); }
        baseTotal += m.sub;
    });
    // baseTotal is in base currency (ARS if moneda=ARS, USD otherwise)
    plist[idx].totalUSD = isARS ? baseTotal / tc : baseTotal;
    plist[idx].totalARS = isARS ? baseTotal       : baseTotal * tc;
    plist[idx].loUSD    = plist[idx].totalUSD * (1 - mg100);
    plist[idx].hiUSD    = plist[idx].totalUSD * (1 + mg100);
    logActivity(presupId, 'edit');
    saveDB();
    document.getElementById('eim-overlay').remove();
    toast('✅ Datos actualizados');
    refreshDetalle(presupId);
}

let ecmLogoTmp = null; // temporary logo state while modal is open

function handleEcmLogo(input, presupId) {
    const file = input.files[0];
    if (!file) return;
    if (file.size > 3 * 1024 * 1024) { toast('❌ Archivo muy grande (máx 3MB)', 'error'); return; }
    const reader = new FileReader();
    reader.onload = e => {
        const isImg = file.type.startsWith('image/');
        ecmLogoTmp = { name: file.name, dataUrl: e.target.result, isImg };
        const prev = document.getElementById('ecm-logo-preview');
        if (prev) {
            prev.innerHTML = isImg
                ? `<img src="${ecmLogoTmp.dataUrl}" style="max-height:60px;max-width:120px;border-radius:4px;object-fit:contain;border:1px solid #ddd">`
                : `<div style="font-size:12px;color:#555;background:#fff;border:1px solid #ddd;border-radius:4px;padding:6px 10px">📄 ${file.name}</div>`;
        }
    };
    reader.readAsDataURL(file);
}

function clearEcmLogo(presupId) {
    ecmLogoTmp = '__clear__';
    const prev = document.getElementById('ecm-logo-preview');
    if (prev) prev.innerHTML = '';
    toast('Logo quitado (guardá para confirmar)');
}

function saveEditContacts(presupId) {

    const readGrp = key => ({
        nom:   document.getElementById(`ecm-${key}-nom`)?.value.trim()  || '',
        email: document.getElementById(`ecm-${key}-email`)?.value.trim()|| '',
        tel:   document.getElementById(`ecm-${key}-tel`)?.value.trim()  || ''
    });

    plist[idx].contacts = {
        comercial: readGrp('comercial'),
        admin:     readGrp('admin'),
        legal:     readGrp('legal')
    };

    // Handle logo
    if (ecmLogoTmp === '__clear__') {
        plist[idx].logo = null;
    } else if (ecmLogoTmp) {
        plist[idx].logo = ecmLogoTmp;
    }
    ecmLogoTmp = null;

    logActivity(presupId, 'edit');
    saveDB();
    document.getElementById('ecm-overlay').remove();
    toast('✅ Contactos actualizados');
    refreshDetalle(presupId);
}

    const sup   = getSupplier(supId);
    if (!sup)   { toast('❌ Proveedor no encontrado', 'error'); return; }

    if (!sesProvs[modId]) sesProvs[modId] = [];
    sesProvs[modId].push({
        id:           uid(),
        supplierId:   supId,
        supplierName: sup.name,
        estado:       document.getElementById('amp-estado').value || 'solicitado',
        moneda:       document.getElementById('amp-moneda').value || 'ARS',

// ── XLSX lazy loader ──────────────────────────────
let _xlsxReady = false;
function loadXlsxLib(cb) {
    if (window.XLSX) { cb(); return; }
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
    s.onload = () => { _xlsxReady = true; cb(); };
    document.head.appendChild(s);
}

// ── Detectar columnas automáticamente ────────────
function detectColumns(rows) {
    if (!rows || rows.length < 2) return { descCol: 0, unitCol: -1, priceCol: 1 };
    const colCount = Math.max(...rows.map(r => r.length));
    const scores = { desc: [], unit: [], price: [] };

    for (let c = 0; c < colCount; c++) {
        const vals = rows.slice(1).map(r => r[c]).filter(v => v !== undefined && v !== null && v !== '');
        const numericRatio = vals.filter(v => !isNaN(parseFloat(String(v).replace(/[.,\s$]/g,'')))).length / (vals.length || 1);
        const avgLen = vals.reduce((s, v) => s + String(v).length, 0) / (vals.length || 1);
        const unitKeywords = /^(m2|m²|ml|u|un|gl|kg|tn|hr|jor|m3|lts?|pza?)$/i;
        const isUnitCol = vals.filter(v => unitKeywords.test(String(v).trim())).length / (vals.length || 1) > 0.3;
        scores.price.push(numericRatio > 0.7 ? numericRatio * 10 : 0);
        scores.unit.push(isUnitCol ? 10 : 0);
        scores.desc.push(numericRatio < 0.3 && avgLen > 5 && !isUnitCol ? avgLen * 0.5 : 0);
    }

    const bestPrice = scores.price.indexOf(Math.max(...scores.price));
    const bestUnit  = scores.unit.indexOf(Math.max(...scores.unit));
    const bestDesc  = scores.desc.indexOf(Math.max(...scores.desc));

    return {
        descCol:  bestDesc,
        unitCol:  scores.unit[bestUnit] > 0 ? bestUnit : -1,
        priceCol: bestPrice
    };
}

// ── Parser numérico formato ARS (3.561,86 → 3561.86) ─
function parseArPrice(val) {
    if (typeof val === 'number') return val;
    const s = String(val).replace(/[$\s]/g, '').trim();
    if (!s) return 0;
    // Formato AR: punto=miles, coma=decimal → "3.561,86"
    if (s.includes(',')) return parseFloat(s.replace(/\./g,'').replace(',','.')) || 0;
    // Formato numérico estándar
    return parseFloat(s.replace(/,/g,'')) || 0;
}

// ── Leer y detectar columnas ──────────────────────
function plReadFile(supplierId) {
    const fileEl = document.getElementById('pl-file');
    if (!fileEl || !fileEl.files[0]) { toast('❌ Seleccioná un archivo', 'error'); return; }
    const file = fileEl.files[0];

    loadXlsxLib(() => {
        const reader = new FileReader();
        reader.onload = e => {
            try {
                const wb   = XLSX.read(e.target.result, { type: 'array' });
                const ws   = wb.Sheets[wb.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
                const filteredRows = rows.filter(r => r.some(c => c !== ''));
                if (filteredRows.length < 2) { toast('❌ El archivo parece estar vacío', 'error'); return; }

                const s         = suppliers.find(x => x.id === supplierId);
                const savedMap  = s?.priceListColumnMap || null;
                const detected  = savedMap || detectColumns(filteredRows);

                window._plRows = filteredRows;
                window._plDetected = detected;

                renderPlPreview(filteredRows, detected, filteredRows[0]);
            } catch(err) {
                toast('❌ Error leyendo el archivo: ' + err.message, 'error');
            }
        };
        reader.readAsArrayBuffer(file);
    });
}

// ── Render preview con selector de columnas ───────
function renderPlPreview(rows, map, headers) {
    const area = document.getElementById('pl-preview-area');
    if (!area) return;
    const colCount = Math.max(...rows.map(r => r.length));
    const colOptions = (sel) => Array.from({length: colCount}, (_,i) =>
        `<option value="${i}" ${sel===i?'selected':''}>${headers[i] || 'Col '+(i+1)}</option>`
    ).join('');
    const noneOpt = (sel) => `<option value="-1" ${sel===-1?'selected':''}>— Ninguna —</option>`;

    const preview = rows.slice(1, 8).map((r,ri) => {
        const desc  = map.descCol  >= 0 ? r[map.descCol]  : '';
        const unit  = map.unitCol  >= 0 ? r[map.unitCol]  : '';
        const price = map.priceCol >= 0 ? r[map.priceCol] : '';
        const priceNum = parseArPrice(price);

function plUpdatePreview() {
    const descCol  = parseInt(document.getElementById('pl-col-desc')?.value ?? '-1');
    const unitCol  = parseInt(document.getElementById('pl-col-unit')?.value ?? '-1');
    const priceCol = parseInt(document.getElementById('pl-col-price')?.value ?? '-1');
    const rows     = window._plRows || [];
    const map      = { descCol, unitCol, priceCol };
    window._plDetected = map;
    const headers  = rows[0] || [];

    const preview = rows.slice(1, 8).map((r,ri) => {
        const desc  = descCol  >= 0 ? r[descCol]  : '';
        const unit  = unitCol  >= 0 ? r[unitCol]  : '';
        const price = priceCol >= 0 ? r[priceCol] : '';
        const priceNum = parseArPrice(price);
        return `<tr style="border-bottom:1px solid #f0f0f0;${ri%2===0?'background:#fafafa':''}">
            <td style="padding:7px 10px;font-size:13px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(String(desc))}</td>
            <td style="padding:7px 10px;font-size:13px;text-align:center;color:#666">${esc(String(unit))}</td>
            <td style="padding:7px 10px;font-size:13px;text-align:right;font-weight:500;color:#111">${!isNaN(priceNum) ? '$ '+priceNum.toLocaleString('es-AR') : esc(String(price))}</td>
        </tr>`;
    }).join('');
    document.getElementById('pl-preview-rows').innerHTML = preview;
}

// ── Guardar lista en proveedor ────────────────────
function plSaveList(supplierId) {
    const period   = document.getElementById('pl-period')?.value;
    if (!period) { toast('❌ Indicá el mes de vigencia', 'error'); return; }
    const rows     = window._plRows || [];
    const map      = window._plDetected || {};
    const { descCol, unitCol, priceCol } = map;

    const items = rows.slice(1).reduce((acc, r) => {
        const desc  = descCol  >= 0 ? String(r[descCol] || '').trim() : '';
        const unit  = unitCol  >= 0 ? String(r[unitCol] || '').trim() : 'gl';
        const rawP  = priceCol >= 0 ? r[priceCol] : '';
        const price = parseArPrice(rawP);
        if (desc && price > 0) acc.push({ desc, unit: unit||'gl', price });
        return acc;
    }, []);

    if (items.length === 0) { toast('❌ No se encontraron ítems con precio válido', 'error'); return; }

    const si = suppliers.findIndex(x => x.id === supplierId);
    if (si < 0) return;

    if (!suppliers[si].priceLists) suppliers[si].priceLists = [];
    // Reemplazar si ya existe ese período, sino agregar
    const existIdx = suppliers[si].priceLists.findIndex(pl => pl.period === period);
    const plEntry = {
        id:          uid(),
        period,
        uploadedAt:  new Date().toISOString(),
        fileName:    document.getElementById('pl-file')?.files[0]?.name || 'lista.xlsx',
        columnMap:   { descCol, unitCol, priceCol },
        items
    };
    if (existIdx >= 0) suppliers[si].priceLists[existIdx] = plEntry;
    else suppliers[si].priceLists.unshift(plEntry);
    // Guardar mapeo para próxima vez
    suppliers[si].priceListColumnMap = { descCol, unitCol, priceCol };
    saveSuppliers();

    document.getElementById('pl-upload-overlay').remove();
    toast('✅ Lista de ' + period + ' guardada — ' + items.length + ' ítems');
    document.getElementById('app').innerHTML = vProveedores();
}

// ── Sección "Listas de precios" en card proveedor ──
function vPriceListSection(s) {
    const lists  = (s.priceLists || []).slice().sort((a,b) => b.period.localeCompare(a.period));
    const last2  = lists.slice(0, 2);

    let changeBadge = '';
    if (last2.length === 2) {
        const avgNew = last2[0].items.reduce((s,i) => s+i.price, 0) / (last2[0].items.length||1);
        const avgOld = last2[1].items.reduce((s,i) => s+i.price, 0) / (last2[1].items.length||1);
        const pct    = avgOld > 0 ? ((avgNew - avgOld) / avgOld * 100).toFixed(1) : 0;
        const color  = pct > 0 ? '#dc2626' : pct < 0 ? '#16a34a' : '#999';
        const arrow  = pct > 0 ? '↑' : pct < 0 ? '↓' : '=';
        changeBadge  = `<span style="font-size:12px;font-weight:700;color:${color};background:${pct>0?'#fef2f2':pct<0?'#f0fdf4':'#f5f5f5'};border-radius:20px;padding:2px 10px">${arrow} ${Math.abs(pct)}% vs mes anterior</span>`;
    }

    const rows = lists.slice(0, 5).map(pl => {
        const date   = new Date(pl.uploadedAt);
        const dateStr= date.toLocaleDateString('es-AR', {day:'2-digit',month:'2-digit',year:'2-digit'});
        const ageMs  = Date.now() - date.getTime();
        const ageDays= Math.floor(ageMs / 86400000);
        const isOld  = ageDays > 45;
        const [yr, mo] = pl.period.split('-');
        const months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
        const periodStr = months[parseInt(mo)-1] + ' ' + yr;
        return `<div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f5f5f5">
            <div style="display:flex;align-items:center;gap:8px">
                <span style="font-size:13px;font-weight:600;color:#111">${periodStr}</span>
                <span style="font-size:11px;color:#aaa">· ${pl.items.length} ítems · subida ${dateStr}</span>
                ${isOld ? '<span style="font-size:11px;color:#dc2626;font-weight:600">⚠ +45 días</span>' : ''}
            </div>
        </div>`;
    }).join('');

    return `<div style="border-top:1px solid #ebebeb;margin-top:14px;padding-top:14px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
            <div style="display:flex;align-items:center;gap:10px">
                <span style="font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:#999">📋 Listas de precios</span>
                ${changeBadge}
            </div>
            <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();showUploadPriceListModal('${s.id}')" style="font-size:12px;color:#7c3aed;padding:3px 10px">＋ Subir lista</button>
        </div>
        ${lists.length === 0
            ? `<div style="font-size:13px;color:#bbb;padding:4px 0">Sin listas cargadas aún</div>`
            : rows}
    </div>`;
}

function impConfirmItems(presupId, modId) {
    const s      = suppliers.find(x => x.id === window._impSupplierId);
    const lists  = (s?.priceLists||[]).slice().sort((a,b) => b.period.localeCompare(a.period));
    const last   = lists[0];
    if (!last) return;

    const p    = plist.find(x => x.id === presupId);
    const tc   = p?.usdArs || cfg.usdArs || 1;
    const isARS= (p?.moneda||'USD') === 'ARS';

    const checked = Array.from(document.querySelectorAll('#imp-items-tbody input[type="checkbox"]'))
        .filter(cb => cb.checked)
        .map(cb => parseInt(cb.dataset.idx));

    if (checked.length === 0) { toast('❌ Seleccioná al menos un ítem', 'error'); return; }

    const pi  = plist.findIndex(x => x.id === presupId);
    const mod = plist[pi]?.modules?.find(m => m.id === modId);
    if (!mod) return;
    if (!mod.items) mod.items = [];

    const [yr, mo] = (window._impPeriod||'').split('-');
    const months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
    const periodStr = months[parseInt(mo)-1] + ' ' + yr;

    checked.forEach(idx => {
        const item = last.items[idx];
        if (!item) return;
        const priceUSD = isARS ? item.price / tc : item.price;
        mod.items.push({
            id:       uid(),
            desc:     item.desc,
            qty:      1,
            unit:     item.unit || 'gl',
            priceUSD: parseFloat(priceUSD.toFixed(2))
        });
    });

    // Recalcular subtotal del módulo
    mod.sub = mod.items.reduce((s,it) => s + (parseFloat(it.qty)||0)*(parseFloat(it.priceUSD)||0), 0);
    _recalcPresupTotals(pi);
    saveDB();

    document.getElementById('imp-sup-overlay').remove();
    toast('✅ ' + checked.length + ' ítems importados desde ' + esc(s.name) + ' · lista ' + periodStr);

    // Refresh desglose
    const detEl = document.getElementById('dm-' + modId);
    if (detEl) {
        const tbody = document.getElementById('dmi-tbody-' + modId);
        if (tbody) {
            tbody.innerHTML = mod.items.map((it,ri) => vDetItemRow(it, ri, modId, p)).join('');
        }
        const totEl = document.getElementById('dm-tot-' + modId);
        if (totEl) totEl.innerHTML = `<div class="det-mod-usd">${fPriP(mod.sub,p)}</div><div class="det-mod-ars">${fSecP(mod.sub,p)}</div>`;
    }
    updateResultPanel(presupId);
}
